version: '3.8'

services:
  # 1. Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: bos_postgres
    restart: always
    environment:
      POSTGRES_DB: bos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin@123456
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bos-network

  # 2. Redis Cache
  redis:
    image: redis:alpine
    container_name: bos_redis
    ports:
      - "6379:6379"
    environment:
      TZ: "Asia/Ho_Chi_Minh"
    networks:
      - bos-network

  # 3. PgAdmin (Optional)
  pgadmin:
    image: dpage/pgadmin4
    container_name: bos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bos.com
      PGADMIN_DEFAULT_PASSWORD: Admin@123456
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - bos-network

  # 4. Backend (Spring Boot)
  backend:
    build: ./backend
    container_name: bos_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bos_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: Admin@123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://192.168.1.3:3000
    depends_on:
      - postgres
      - redis
    networks:
      - bos-network

  # 5. Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://192.168.1.3:8080/api
    container_name: bos_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.3:8080/api
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    networks:
      - bos-network

volumes:
  postgres_data:


networks:
  bos-network:
    driver: bridge
